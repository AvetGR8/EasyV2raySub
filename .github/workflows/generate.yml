name: Generate V2Ray Links

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests>=2.32.3 beautifulsoup4>=4.12.3

      - name: Run generate.py
        run: python generate.py --url https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha.txt

      - name: Check for file changes
        id: check_changes
        run: |
          if [ ! -f links.txt ]; then
            echo "links.txt not found, creating empty file"
            touch links.txt
          fi
          
          if git diff --quiet links.txt; then
            echo "No changes detected in links.txt"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "Changes detected in links.txt"
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push updated links
        if: env.has_changes == 'true'
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add links.txt
          git commit -m "Update links.txt - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
